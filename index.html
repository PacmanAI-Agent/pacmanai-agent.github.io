<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Job Booking</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mobiscroll/javascript@5.16.0/dist/css/mobiscroll.min.css">
</head>
<body>
<header>
<h1>Arkwright’s Freight Ltd – Job Booking</h1>
</header>
<main>
<form id="bookingForm">
  <input type="hidden" name="Company" value="Arkwright’s Freight Ltd" />

  <label for="destination">Company Destination</label>
  <input type="text" id="destination" name="Destination" required />

  <label for="address">Address (optional)</label>
  <input type="text" id="address" name="Address" />

  <label for="description">Description</label>
  <textarea id="description" name="Description" required></textarea>

  <label for="type-picker">Pick‑up / Drop‑off</label>
  <input type="text" id="type-picker" name="Type" required placeholder="Pick‑up / Drop‑off" />

  <label for="phone">Phone (optional)</label>
  <input type="tel" id="phone" name="Phone" />

  <label for="attachment">Attachments</label>
  <input type="file" id="attachment" name="Attachment" />

  <label for="date-picker">Date</label>
  <input type="date" id="date-picker" name="Date" required />

  <button type="submit">Book Job</button>
</form>
<section id="status"></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@mobiscroll/javascript@5.16.0/dist/js/mobiscroll.min.js"></script>
<script src="script.js"></script>
</body>
</html>
